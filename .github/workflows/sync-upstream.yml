name: Sync from Upstream (Git)

on:
  push: { branches: [ master ] }  # Trigger on push to master branch
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight (adjust cron schedule as needed)

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3  # Checkout the current repository
      - name: Fetch updates from upstream
        run: git fetch origin
      - name: Check for changes 
        run: |
          upstream_sha=$(git rev-parse origin/master)
          current_sha=$(git rev-parse HEAD)
          if [[ $upstream_sha != $current_sha ]]; then
            echo "Upstream has updates. Merging..."
            git merge origin/master
          else
            echo "Upstream is up-to-date."
          fi
