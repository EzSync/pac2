name: Sync Upstream

on:
  schedule:
    - cron: '0 * * * *'  # This will run the workflow every hour
  workflow_dispatch:  # Allows manual triggering of the workflow

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          repository: Alvin9999/pac2  # The upstream repository
          path: upstream  # Path to checkout the upstream repo

      - name: Checkout fork
        uses: actions/checkout@v2
        with:
          path: fork  # Path to checkout your forked repo
          persist-credentials: false  # Prevents using the default GitHub token

      - name: Sync upstream
        run: |
          cd fork
          git remote add upstream https://github.com/Alvin9999/pac2
          git fetch upstream
          # Check if the master branch exists
          if git show-ref --verify --quiet refs/heads/master; then
            git checkout master  # Checkout master if it exists
            git merge upstream/master --allow-unrelated-histories  # Merge changes from upstream
            git push origin master  # Push changes to your fork
          else
            echo "Branch 'master' does not exist in the fork."
            exit 1  # Exit with an error if the branch does not exist
          fi

      - name: Clean up
        run: |
          rm -rf upstream
          rm -rf fork
